name: secret-scan

on:
  pull_request:
  push:
    branches:
      - master
      - main
  schedule:
    - cron: '17 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: v8.30.1
    steps:
      - name: Check out full repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go for gitleaks install
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: false

      - name: Install gitleaks
        run: |
          go install "github.com/zricethezav/gitleaks/v8@${GITLEAKS_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Scan full Git history
        run: gitleaks git --log-opts="--all" . --redact=100 --no-banner --log-level warn

      - name: Scan checked-out worktree
        run: gitleaks dir . --redact=100 --no-banner --log-level warn
