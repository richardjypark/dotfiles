interface:
  display_name: "Jujutsu (jj)"
  short_description: "Use Jujutsu for history inspection, bookmark-safe publishing, recovery, and interactive helper workflows in Git-backed repos."
  default_prompt: "Use $jj to route jj/git-only history tasks through the `jj` subagent when the `subagent` tool is available; otherwise invoke `jj-fast-agent` via bash before any manual jj/git commands when it is available in PATH, then fall back to direct jj status / jj log / jj diff inspection, reshaping, and recovery with jj undo. Prefer Jujutsu over raw git commands."
